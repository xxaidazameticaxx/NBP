server:
  port: 9000
  shutdown: graceful
  error:
    include-message: always

app:
  developer:
    email: ${DEV_EMAIL}
    default-password: ${DEV_PASSWORD}
  auth:
    jwt-secret: ${JWT_SECRET}
    jwt-issuer: ${JWT_ISSUER:nbp-app}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:30}
    refresh-token-minutes: ${JWT_REFRESH_TOKEN_MINUTES:10080}

spring:
  application:
    name: NBP

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver

  # Gmail SMTP Server Settings
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true